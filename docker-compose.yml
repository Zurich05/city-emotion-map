services:
  backend:
    build:
      context: ./backend
    environment:
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      DATABASE_URL: sqlite:////data/city_emotion.db
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-city_emotion}
      POSTGRES_USER: ${POSTGRES_USER:-city_emotion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-city_emotion_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  backend-data:
  postgres-data:
