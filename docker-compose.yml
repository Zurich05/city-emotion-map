services:
  backend:
    build:
      context: ./backend
    environment:
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      DATABASE_URL: sqlite:////data/city_emotion.db
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-data:
